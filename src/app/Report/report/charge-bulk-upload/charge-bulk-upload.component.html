    <mat-icon class="home-icon" routerLink="/home">home</mat-icon>Home/Charge Upload
  </h2>

  <div fxLayout="column" fxLayoutGap="2%">
    <div fxFlex="100%" fxLayoutGap="2%">
      <div fxFlex="30%">
        <button mat-raised-button class="mat-elevation-z12" (click)="exportexcel('tableWithHeader')"
          color="primary">Download Format</button>
      </div>
      <div fxFlex="60%" fxLayoutAlign="end">
        <div fxLayout.xs="column" fxLayoutGap=2% fxLayoutAlign="end">
          <input style="visibility: hidden;" type='file'
            accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" (change)="onSelectFile($event)"
            #document>
          <button mat-raised-button color="primary" (click)="document.click()"
            class="mat-elevation-z12 box-button swing">
            Upload EXCEL </button>
        </div>
      </div>
    </div>
    <div fxFlex="100%" style="visibility: hidden;">
      <table class="table table-bordered" id="tableWithHeader">
        <thead>
          <tr>
            <th>Record_number</th>
            <th>Customer_id</th>
            <th>Loan_number</th>
            <th>ledger_id</th>
            <th>transaction_type</th>
            <th>Rec_Pay_amt</th>
            <th>Business_Partner</th>
            <th>Rec_Pay_chargecode</th>
            <th>Rec_Pay_date</th>
            <th>Remark</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</mat-card>
