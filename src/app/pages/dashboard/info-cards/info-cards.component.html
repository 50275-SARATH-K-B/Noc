<div fxLayout="row wrap" #resizedDiv>

    <div fxFlex="100" fxFlex.gt-sm="50" fxFlex.sm="100" class="flex-p">
        <mat-card class="p-0">
            <mat-card-header class="p-1" fxLayoutAlign="space-between center">
                <mat-card-subtitle class="m-0">DISBURSEMENT DETAILS</mat-card-subtitle>
            </mat-card-header>
            <div class="w-100 h-100p">
                <ngx-charts-bar-vertical [scheme]="colorScheme" [results]="disbursement" (select)="onSelect($event)">
                </ngx-charts-bar-vertical>
            </div>
        </mat-card>
    </div>
    <div fxFlex="100" fxFlex.gt-sm="25" fxFlex.sm="100" class="flex-p">
        <mat-card class="p-0">
            <mat-card-header class="p-1" fxLayoutAlign="space-between center">
                <mat-card-subtitle class="m-0">DUE V/S COLLECTION</mat-card-subtitle>
            </mat-card-header>
            <div class="w-100 h-100p">
                <ngx-charts-line-chart [scheme]="colorSchemeDue" [results]="DueDay" [autoScale]="autoScale"
                    (select)="onSelect($event)">
                </ngx-charts-line-chart>
            </div>
        </mat-card>
    </div>

    <div fxFlex="100" fxFlex.gt-sm="25" fxFlex.sm="100" class="flex-p">
        <mat-card class="p-0">
            <mat-card-header class="p-1" fxLayoutAlign="space-between center">
                <mat-card-subtitle class="m-0">BUCKET WISE</mat-card-subtitle>
            </mat-card-header>
            <div class="w-100 h-100p">
                <ngx-charts-bar-vertical [scheme]="colorSchemeBucket" [results]="Bucket" (select)="onSelect($event)">
                </ngx-charts-bar-vertical>
            </div>
        </mat-card>
    </div>
