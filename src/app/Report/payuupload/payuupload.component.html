<div fxLayout="column" fxLayout.gt-sm="row wrap">
  <div fxFlex="100" class="flex-p">
    <form #activityEntryDataUploadForm="ngForm">
      <mat-card fxFlex="100%" fxLayout="column">
        <h2>Data Upload</h2>
 
   
        <!-- <div fxLayout.xs="column" fxLayout="row" fxLayoutGap="2%">
        
          Upload Eligibility Data  Excel file
          <label>  
            <input type="file" (change)="addfile($event)" placeholder="Upload file" accept=".xls, .xlsx"> 
          </label>
        </div> -->
        <div fxFlex="100%" fxLayoutAlign="end">
          <div fxFlex="100%" fxLayout.xs="column" fxLayoutGap=2% fxLayoutAlign="end">
            <label>
              <input  type='file' 
              (change)="addfile($event)" accept=".xls, .xlsx" placeholder="Upload file"
             #document>
            </label>
            
        
          </div>
        </div>
        <div style="margin-top: 2rem;">
          <table mat-table [dataSource]="eligibilitySource" >

            <ng-container matColumnDef="SlNo">
              <th mat-header-cell *matHeaderCellDef> SlNo </th>
              <td mat-cell *matCellDef="let element ;  let i= index"> {{i+1}} </td>
            </ng-container>
            <ng-container matColumnDef="TransactionID">
              <th mat-header-cell *matHeaderCellDef> TransactionID </th>
              <td mat-cell *matCellDef="let element"> {{element.customerID}} </td>
            </ng-container>
            
            
            <ng-container matColumnDef="Amount">
              <th mat-header-cell *matHeaderCellDef> Amount </th>
              <td mat-cell *matCellDef="let element"> {{element.eligibilityAmount}} </td>
            </ng-container>
            
            <!-- income_particulars: any;
            income_Amount: any; -->
            <!-- <ng-container matColumnDef="Action">
              <th mat-header-cell *matHeaderCellDef>Action</th>
              <td mat-cell *matCellDef="let element;  let i= index">
                <div fxLayoutGap="2%" fxFlex="15% auto" fxLayout="row">             
                  <button mat-icon-button (click)="deleteTableItem({element:element,index:i},1)"color="warn">
                    <mat-icon>delete_forever</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container> -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>
   
          <div  fxLayoutGap="2%" fxLayoutAlign="end">
            <button type="submit" class="button-box box" mat-raised-button color="primary" [disabled]="eligibilitySource== undefined || eligibilitySource.data.length== 0"
              (click)="savedata(activityEntryDataUploadForm)"  id="confirm_btn">Confirm</button>
            <button mat-raised-button class="button-box box" color="primary" (click)="clear(activityEntryDataUploadForm)"  id="clear_btn">Clear</button>
          </div>
      </mat-card>
    </form>
  </div>
</div>
