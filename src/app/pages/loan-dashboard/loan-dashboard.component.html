<div class="flex-p" fxLayout="column">
  <!-- <mat-card>
      <mat-card-content>
      
      </mat-card-content>
    </mat-card> -->

  <mat-card>
    <mat-card-content fxLayout="column">
      <h2>Loan Dashboard</h2>
      <div fxLayout="row" fxLayoutGap="2%" fxFlex="100%" class="myt-1">
        <mat-form-field fxFlex="50%" fxFlex.xs="90%">
          <input matInput autocomplete="off" placeholder="Search here.." type="text" [(ngModel)]="filter" name="filter">
        </mat-form-field>

        <button matTooltip="Search" class="mat-elevation-z12 box-button" type="button" color="primary"
          (click)="filterSource()" mat-mini-fab>
          <mat-icon>search</mat-icon>
        </button>
      </div>
      <div style="overflow:scroll;-ms-overflow-style: -ms-autohiding-scrollbar" >
        <table mat-table matSort [dataSource]="dataSource">
          <ng-container matColumnDef="LoanID">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Loan Id
              <!-- <div>
                <mat-form-field>
                  <input matInput class="form-field" [formControl]="loanFilter" placeholder="Loan Id Filter">
                </mat-form-field>
              </div> -->
            </th>
            <td mat-cell *matCellDef="let element"> <a routerLinkActive="active"
                [routerLink]="['/repayment/installment-receipt',{LoanId:+element.LoanID}]">{{element.LoanID}}
              </a>
            </td>
          </ng-container>
          <ng-container matColumnDef="CustomerName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Customer </th>
            <td mat-cell *matCellDef="let element"> {{element.CustomerName}} </td>
          </ng-container>
          <ng-container matColumnDef="ProductName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Name </th>
            <td mat-cell *matCellDef="let element"> {{element.ProductName}} </td>
          </ng-container>
          <ng-container matColumnDef="BranchName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Branch Name </th>
            <td mat-cell *matCellDef="let element"> {{element.BranchName}} </td>
          </ng-container>
          <ng-container matColumnDef="LoanStatus">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Status </th>
            <td mat-cell *matCellDef="let element"> {{element.LoanStatus}} </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky:true"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSize]="5" showFirstLastButtons></mat-paginator>
      </div>

    </mat-card-content>
  </mat-card>
</div>
