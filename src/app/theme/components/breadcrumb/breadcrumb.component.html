<div fxLayout="row wrap" *ngIf="router.url != '/'">
    <div fxFlex="100" class="flex-p">
        <mat-card fxLayout="row" class="breadcrumb">
            <div class="breadcrumb-item" fxLayout="row" fxLayoutAlign="start center"        >
                <mat-icon (click)="backClicked()" >home</mat-icon>
                <span class="breadcrumb-title" style="margin-left: 12.5%">Home&nbsp;</span>
            </div>
            <div *ngFor="let breadcrumb of breadcrumbs; let i = index;" class="breadcrumb-item" fxLayout="row"
                fxLayoutAlign="start center">
                <a [hidden]="i == (breadcrumbs.length - 1)" [routerLink]="[breadcrumb.url]">{{breadcrumb.name}}</a>
                <span [hidden]="i != (breadcrumbs.length - 1)" class="breadcrumb-title active">{{breadcrumb.name | uppercase }}</span>
            </div>
        </mat-card>
    </div>
</div>
