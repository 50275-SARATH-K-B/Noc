<div class="flex-p" fxLayout="column">
  <mat-card>
    <mat-card-content fxLayout="column">
      <h2>Application Dashboard</h2>
      <div fxLayout="row" fxLayoutGap="2%" fxFlex="100%" class="myt-1">
        <mat-form-field fxFlex="50%" fxFlex.xs="90%">
          <input matInput autocomplete="off" placeholder="Search here..." type="text" [(ngModel)]="filter"
            name="filter">
        </mat-form-field>
        <button matTooltip="Search" class="mat-elevation-z12 box-button" type="button" color="primary"
          (click)="filterSource()" mat-mini-fab>
          <mat-icon>search</mat-icon>
        </button>
      </div>
      <div class="mat-elevation-z8">
        <div class="mat-elevation-z8">
          <table mat-table matSort [dataSource]="dataSource" width="100%" style="width:100%;overflow-x: scroll;">
            <ng-container matColumnDef="applicationId">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> Application ID </th>
              <td mat-cell *matCellDef="let element"> <a routerLinkActive="active"
                  [routerLink]="['/loan/application-details', {applicationId:+element.applicationId}]">{{element.applicationId}}
                </a>
              </td>
            </ng-container>
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Customer </th>
              <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>
            <ng-container matColumnDef="productName">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Name </th>
              <td mat-cell *matCellDef="let element"> {{element.productName}} </td>
            </ng-container>
            <ng-container matColumnDef="branchName">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Branch Name </th>
              <td mat-cell *matCellDef="let element"> {{element.branchName}} </td>
            </ng-container>
            <ng-container matColumnDef="statusDescr">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Status </th>
              <td mat-cell *matCellDef="let element"> {{element.statusDescr}} </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky:true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
          <mat-paginator [pageSize]="5" showFirstLastButtons></mat-paginator>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
