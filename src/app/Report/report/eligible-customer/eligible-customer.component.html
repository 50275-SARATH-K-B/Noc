<div class="flex-p" fxLayout="column">
  <mat-card>
    <mat-card-content fxLayout="column">
      <h2>Eligible Customer</h2>
      <div fxLayout="row" fxLayoutGap="2%" fxFlex="100%" class="form-block search-container">
        <mat-form-field fxFlex="23.3%" fxFlex.xs="90%">
          <input matInput autocomplete="off" placeholder="Search here..." type="text" [(ngModel)]="filter"
            name="filter">
        </mat-form-field>

        <button matTooltip="Search" class="mat-elevation-z12 box-button" type="button" color="primary"
          (click)="filterSource()" mat-mini-fab>
          <mat-icon>search</mat-icon>
        </button>
      </div>
      <div class="form-block">
        <div style="overflow: scroll;-ms-overflow-style: scrollbar;" fxLayout="column" fxLayout.xs="column">
          <table mat-table [dataSource]="dataSource">
            <ng-container matColumnDef="branchID">
              <th mat-header-cell *matHeaderCellDef> Branch ID </th>
              <td mat-cell *matCellDef="let element"> <a routerLinkActive="active"
                  (click)="getCustomerLoanDetails(+element.BranchID)"
                  style="color: blue;cursor: pointer;">{{element.BranchID}}
                </a>
              </td>
            </ng-container>
            <ng-container matColumnDef="branchName">
              <th mat-header-cell *matHeaderCellDef>Branch Name </th>
              <td mat-cell *matCellDef="let element"> {{element.BranchName}} </td>
            </ng-container>
            <ng-container matColumnDef="count">
              <th mat-header-cell *matHeaderCellDef style="width: 12%;text-align: center;"> Count </th>
              <td mat-cell *matCellDef="let element" style="text-align: right;"> {{element.CustCount}} </td>
            </ng-container>
            <ng-container matColumnDef="amount">
              <th mat-header-cell *matHeaderCellDef style="width: 22%;text-align: center;">Total Amount </th>
              <td mat-cell *matCellDef="let element" style="text-align: right;">
                {{element.ApprovedAmount | number:'.2-2'}} </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky:true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
          <mat-paginator fxFlex.xs="100%" fxFlex="100%" [pageSize]="5" showFirstLastButtons></mat-paginator>
        </div>
        <div style="margin: 7px;" fxLayoutAlign="end">
          <span><b>TOTAL AMOUNT: {{total | number:'.2-2'}}</b></span>
        </div>
      </div>

    </mat-card-content>
  </mat-card>
</div>
