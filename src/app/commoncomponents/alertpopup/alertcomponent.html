<style>
    .success {
        color: green;
    }

    .alert {
        color: rgb(248, 151, 6);
    }

    .error {
        color: rgb(224, 44, 44);
    }

    .btd-error {
        background: linear-gradient(to right, rgb(233, 75, 88) 0%, rgba(221, 76, 8, 0.986) 100%);
        color: seashell !important;
        line-height: 32px !important;
    }

    .btd-success {
        background: linear-gradient(to right, green 0%, rgba(114, 148, 86, 0.986) 100%);
        color: seashell !important;
        line-height: 32px !important;
    }

    .btd-alert {
        background: linear-gradient(to right, rgb(228, 161, 61) 0%, rgba(172, 164, 55, 0.986) 100%);
        color: seashell !important;
        line-height: 32px !important;
    }
</style>
<div class="flex-p" ngStyle.xs="max-width:160px !important" fxFlex="100%">
    <div fxLayout="column" fxFlex="100%">
        <div class="flex-p" style="margin-top: 10px" fxLayoutGap="2%">
            <div fxLayout="row" fxLayoutAlign="space-between">
                <h2 [ngClass]="{ 'alert' : data.type  === 'Alert', 
            'success' : data.type  === 'Success',
            'error' :  data.type  ===  'Error' }"> {{data.type}} ! </h2>
                <button type="button" mat-mini-fab mat-dialog-close id="close_button" fxLayoutAlign="center center">
                    <mat-icon id="icun">close</mat-icon>
                </button>
            </div>
            <div fxLayout.xs="column" fxLayout="column">
                <label fxLayoutAlign="center"> {{data.message}} </label>
            </div>
            <div fxLayoutAlign="end" fxLayoutAlign.xs="center">
                <button mat-raised-button [mat-dialog-close]="true" [ngClass]="{ 'btd-alert' : data.type  === 'Alert', 
                'btd-success' : data.type === 'Success',
                'btd-error' :  data.type ===  'Error' }">Close</button>
            </div>
        </div>
    </div>
</div>
