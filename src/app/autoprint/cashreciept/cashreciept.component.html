<div >
    <div fxLayout="column">
        <div fxLayout="column" fxLayoutGap="2%" style="margin-left: -10%">
            <mat-card fxLayoutAlign="center" id="printSectionId">
                <mat-card-content style="margin-left:-10%" fxFlex=80%>
                    <h3 fxLayoutAlign="center"> {{userData.firmName}}</h3>
                    <h3 fxLayoutAlign="center">{{userData.branchName}}</h3>
                    <h4 fxLayoutAlign="center"> CASH RECIEPT</h4>
                    <div fxLayout="row">
                        <!-- <h5 style="margin-left: 50%">Customer copy</h5>
              <p style="padding-left: 20px"><span>12/12/12</span><span>12:01:34</span></p> -->
                    </div>
                    <div fxLayout="row" style="margin-top: 1%;margin-left: 10%">

                        <div fxFlex="60%" fxLayoutAlign="start" fxLayout="column" style="margin-left: 10%">
                            <p>Loan No : <span>{{loanno}}</span></p>
                        </div>
                        <div fxFlex="40%" fxLayout="column">
                            <p>Date : <span>{{date}}</span></p>
                            <p>Time : <span>{{time}}</span></p>

                        </div>
                    </div>
                    <mat-divider></mat-divider>
                    <div style="margin-top: 1%">
                        <div style="margin-left: 20%">
                            <p fxFlex="100%"> Recieved From&nbsp;&nbsp;:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;{{customerName}} </p>
                            <p fxFlex fxLayoutAlign="center"></p>
                        </div>
                        <div style="margin-left: 20%">
                            <p fxFlex="50%"> Amount&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;:&nbsp;&nbsp;&nbsp;{{amount}}  </p>
                           
                        </div>
                       
                        <div style="margin-left: 20%">
                            <p fxFlex >In Words Rupees: {{amount | numberToWords}} Only</p>
                        </div>

                    </div>
                    <mat-divider></mat-divider>
                   
                    <div fxLayout="row" style="margin-top: 1%;margin-left: 2%">

                        <div fxFlex="50%" fxLayoutAlign="start" fxLayout="column" style="margin-left: 2%">
                        
                            <br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/>
                        </div>
                        
                        
                        
                        <div fxFlex="40%" fxLayout="column" style="margin-top: 5%">
                            <p>Authorized Signatory</p>

                        </div>
                    </div>
                </mat-card-content>
            </mat-card>
            </div>
            </div>
            </div>
